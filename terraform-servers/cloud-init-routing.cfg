#cloud-config
# vim: syntax=yaml
#
# ***********************
# 	---- for more examples look at: ------
# ---> https://cloudinit.readthedocs.io/en/latest/topics/examples.html
# ******************************
#
# This is the configuration syntax that the write_files module
# will know how to understand. encoding can be given b64 or gzip or (gz+b64).
# The content will be decoded accordingly and then written to the path that is
# provided.
#
# Note: Content strings here are truncated for example purposes. $${count.index}

hostname: ${hostname}
fqdn: ${hostname}.openstack.mine
manage_etc_hosts: false
ssh_pwauth: True
users:
  - name: kolla
    ssh_authorized_keys:
      - ${ssh_public_key}
    lock_passwd: false
    # the password is generated using: mkpasswd -m sha-512 "1234"
    passwd: $6$.NO1xMXBmPli7nXx$flG9pE.4yUaMKSIQ8w7yXWpxkXxXrfW7eUH7zTIT4wYR2WeVuV/14NEfPJqfwnI/BSjRt/DEn6eDcU8laaZ6Q1
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    shell: /bin/bash
    groups: wheel

disable_root: false
package_update: true
package_upgrade: true
packages:
  - qemu-guest-agent
  - curl
  - wget
  - tmux
  - jq
  - vlan
  - ripgrep
  - fzf
  - python3
  - python3-virtualenv
  - python3-pip
  - python3-dev
write_files:
  - path: /etc/systemd/system/krtroute.service
    content: |
      [Unit]
      Description=MASQUERADE FOR ROUTING

      [Service]
      Type=oneshot
      ExecStart=/usr/sbin/iptables -t nat -A POSTROUTING -s 172.27.30.0/24 -j MASQUERADE
      RemainAfterExit=yes
      TimeoutSec=0
      WorkingDirectory=/
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
    permissions: '0644'
runcmd:
  - systemctl daemon-reload
  - systemctl enable krtroute.service
  - systemctl start krtroute.service
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  - sed -i 's/#net.ipv4.ip_forward=1/net.ipv4.ip_forward=1/g' /etc/sysctl.conf
  - sysctl -p

